{% load static %}
<div class="d-flex">
    <aside class="d-flex flex-column flex-shrink-0" style="min-height: 100vh; background-color: #D9D9D9; width: collapse;" id="mainSidebar">
    <!-- Encabezado con logo y botón colapsador -->
    <div class="d-flex align-items-center justify-content-center mb-4 pb-2" style="border-bottom: none;">
            <div class="collapse show" id="brandWrapper">
                <span class="fs-4 fw-semibold text-dark" id="brandText">
                    <i class="fas fa-bolt text-warning me-1"></i> MikroCore
                </span>
            </div>
            <!-- Botón que colapsa el contenido de textos y el logo -->
            <button class="btn btn-sm btn-outline-dark" type="button" data-bs-toggle="collapse" data-bs-target=".menu-text,#brandWrapper" aria-expanded="true" aria-label="Colapsar contenido">
                <img src="{% static 'images/barraTriple.svg' %}" alt="Menu" width="30" height="30">
            </button>
    </div>

    <!-- Navegación principal -->
    <div id="menuTextos">
        <ul class="nav nav-pills flex-column mb-auto p-3">
        <li class="nav-item">
            <a href="{% url 'home' %}" class="nav-link text-dark d-flex align-items-center gap-3" title="Inicio">
            <img src="{% static 'images/inicio.svg' %}" alt="Logo" width="30" height="30" >
            <span class="sidebar-text text-dark menu-text collapse show">Inicio</span>
            </a>
        </li>
        <li class="nav-item">
            <a href="#" class="nav-link text-dark d-flex align-items-center gap-3" title="Clientes">
            <img src="{% static 'images/clientes.svg' %}" alt="Clientes" width="30" height="30" >
            <span class="sidebar-text text-dark menu-text collapse show">Clientes</span>
            </a>
        </li>
        <li class="nav-item">
            <a href="{% url 'gestion_pagos' 0 %}" class="nav-link text-dark d-flex align-items-center gap-3" title="Pagos">
            <img src="{% static 'images/pagos.svg' %}" alt="Pagos" width="30" height="30" >
            <span class="sidebar-text text-dark menu-text collapse show">Pagos</span>
            </a>
        </li>
        <li class="nav-item">
            <a href="#" class="nav-link text-dark d-flex align-items-center gap-3" title="Servicios">
            <img src="{% static 'images/servicios.svg' %}" alt="Servicios" width="30" height="30" >
            <span class="sidebar-text text-dark menu-text collapse show">Servicios</span>
            </a>
        </li>
        <li class="nav-item">
            <a href="#" class="nav-link text-dark d-flex align-items-center gap-3" title="Morosidad">
            <img src="{% static 'images/morosidad.svg' %}" alt="Morosidad" width="30" height="30" >
            <span class="sidebar-text text-dark menu-text collapse show">Morosidad</span>
            </a>
        </li>
        <li class="nav-item">
            <a href="#" class="nav-link text-dark d-flex align-items-center gap-3" title="Reportes">
            <img src="{% static 'images/reportes.svg' %}" alt="Reportes" width="30" height="30" >
            <span class="sidebar-text text-dark menu-text collapse show">Reportes</span>
            </a>
        </li>
        <li class="nav-item">
            <a href="#" class="nav-link text-dark d-flex align-items-center gap-3" title="Logs">
            <img src="{% static 'images/logs.svg' %}" alt="Logs" width="30" height="30" >
            <span class="sidebar-text text-dark menu-text collapse show">Logs</span>
            </a>
        </li>
        </ul>
    </div>
  </aside>
</div>
